name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (optional for manual runs)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  models: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "${{ inputs.tag }}" ]]; then
              echo "workflow_dispatch requires inputs.tag" >&2
              exit 1
            fi
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Unable to resolve release tag" >&2
            exit 1
          fi

          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag '$TAG' is not available in this checkout" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build release context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG="$(git tag --sort=-v:refname | grep -Fvx "$TAG" | head -n 1 || true)"

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="$PREV_TAG..$TAG"
          else
            RANGE="$TAG"
          fi

          mkdir -p .github/release
          CONTEXT_FILE=".github/release/context.txt"
          STRUCTURED_FILE=".github/release/context_structured.json"
          DETERMINISTIC_NOTES_FILE=".github/release/notes_deterministic.md"

          export TAG PREV_TAG RANGE CONTEXT_FILE STRUCTURED_FILE DETERMINISTIC_NOTES_FILE
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          
          TAG = os.environ["TAG"]
          PREV_TAG = os.environ.get("PREV_TAG", "")
          RANGE = os.environ["RANGE"]
          CONTEXT_FILE = os.environ["CONTEXT_FILE"]
          STRUCTURED_FILE = os.environ["STRUCTURED_FILE"]
          DETERMINISTIC_NOTES_FILE = os.environ["DETERMINISTIC_NOTES_FILE"]
          REPO = os.environ.get("GITHUB_REPOSITORY", "")
          
          COMMIT_CAP = 300
          FILE_CAP = 500
          
          
          def run_git(args: list[str]) -> str:
              return subprocess.check_output(["git", *args], text=True).strip("\n")
          
          
          all_commits = [c for c in run_git(["rev-list", "--no-merges", RANGE]).splitlines() if c]
          total_commit_count = len(all_commits)
          selected_commits = all_commits[:COMMIT_CAP]
          commit_truncated = total_commit_count > COMMIT_CAP
          
          changed_files_raw = run_git(["diff", "--name-status", RANGE])
          all_changed_files = [l for l in changed_files_raw.splitlines() if l]
          total_file_count = len(all_changed_files)
          selected_changed_files = all_changed_files[:FILE_CAP]
          file_truncated = total_file_count > FILE_CAP
          
          sections: dict[str, list[dict[str, object]]] = {
              "breaking_changes": [],
              "features": [],
              "fixes": [],
              "maintenance": [],
          }
          upgrade_notes: list[str] = []
          uncategorized_count = 0
          
          upgrade_file_markers = (
              "custom_components/atlas_scientific_pool/config_flow.py",
              "custom_components/atlas_scientific_pool/const.py",
              "custom_components/atlas_scientific_pool/models.py",
              "custom_components/atlas_scientific_pool/coordinator.py",
              "custom_components/atlas_scientific_pool/manifest.json",
              "custom_components/atlas_scientific_pool/sensor.py",
              "custom_components/atlas_scientific_pool/number.py",
              "custom_components/atlas_scientific_pool/select.py",
              "custom_components/atlas_scientific_pool/switch.py",
              "custom_components/atlas_scientific_pool/binary_sensor.py",
              "custom_components/atlas_scientific_pool/button.py",
          )
          
          for commit in selected_commits:
              subject = run_git(["show", "-s", "--format=%s", commit]).strip()
              body = run_git(["show", "-s", "--format=%b", commit]).strip()
              author = run_git(["show", "-s", "--format=%an", commit]).strip()
              short_hash = run_git(["show", "-s", "--format=%h", commit]).strip()
              files = [line for line in run_git(["show", "--name-only", "--pretty=format:", commit]).splitlines() if line]
          
              text = f"{subject}\n{body}".lower()
              conventional_match = re.match(r"^(feat|fix|chore|docs|refactor|perf|test|build|ci|style|revert)(\(.+\))?(!)?:", subject.lower())
              commit_type = conventional_match.group(1) if conventional_match else ""
          
              entry = {
                  "subject": subject,
                  "hash": short_hash,
                  "author": author,
                  "files": files,
              }
          
              is_breaking = (
                  "breaking change" in text
                  or "breaking:" in text
                  or bool(re.search(r"^[a-z]+(\(.+\))?!:", subject.lower()))
              )
              is_feature = (
                  commit_type == "feat"
                  or subject.lower().startswith("add ")
                  or "feature" in text
                  or "introduce" in text
              )
              is_fix = (
                  commit_type == "fix"
                  or any(token in text for token in (" bug", "bugfix", "fix ", "fix:", "hotfix", "regression"))
              )
          
              if is_breaking:
                  sections["breaking_changes"].append(entry)
              elif is_feature:
                  sections["features"].append(entry)
              elif is_fix:
                  sections["fixes"].append(entry)
              else:
                  if not commit_type:
                      uncategorized_count += 1
                  sections["maintenance"].append(entry)
          
              touches_upgrade_surface = any(path in upgrade_file_markers for path in files)
              mentions_upgrade = any(token in text for token in ("upgrade", "migration", "breaking", "config", "default", "schema"))
              if touches_upgrade_surface or mentions_upgrade:
                  upgrade_notes.append(f"{subject} ({short_hash})")
          
          structured = {
              "repository": REPO,
              "current_tag": TAG,
              "previous_tag": PREV_TAG,
              "range": RANGE,
              "counts": {
                  "total_commits": total_commit_count,
                  "included_commits": len(selected_commits),
                  "commit_truncated": commit_truncated,
                  "total_changed_files": total_file_count,
                  "included_changed_files": len(selected_changed_files),
                  "file_truncated": file_truncated,
                  "uncategorized_commit_count": uncategorized_count,
              },
              "sections": sections,
              "upgrade_notes": sorted(set(upgrade_notes)),
              "changed_files_preview": selected_changed_files,
          }
          
          with open(STRUCTURED_FILE, "w", encoding="utf-8") as f:
              json.dump(structured, f, indent=2)
          
          with open(CONTEXT_FILE, "w", encoding="utf-8") as f:
              f.write(f"Repository: {REPO}\n")
              f.write(f"Current tag: {TAG}\n")
              f.write(f"Previous tag: {PREV_TAG or 'none'}\n")
              f.write(f"Diff range: {RANGE}\n\n")
              f.write("## Counts\n")
              f.write(f"- Commits included: {len(selected_commits)} / {total_commit_count}\n")
              f.write(f"- Changed files included: {len(selected_changed_files)} / {total_file_count}\n")
              f.write(f"- Uncategorized commits routed to Maintenance: {uncategorized_count}\n\n")
              f.write("## Structured sections\n")
              for key, title in (
                  ("breaking_changes", "Breaking Changes"),
                  ("features", "Features"),
                  ("fixes", "Fixes"),
                  ("maintenance", "Maintenance"),
              ):
                  f.write(f"### {title}\n")
                  if sections[key]:
                      for item in sections[key]:
                          f.write(f"- {item['subject']} ({item['hash']})\n")
                  else:
                      f.write("- none\n")
                  f.write("\n")
          
              f.write("## Upgrade Notes Candidates\n")
              if structured["upgrade_notes"]:
                  for note in structured["upgrade_notes"]:
                      f.write(f"- {note}\n")
              else:
                  f.write("- none\n")
          
          with open(DETERMINISTIC_NOTES_FILE, "w", encoding="utf-8") as f:
              if commit_truncated or file_truncated:
                  f.write(
                      "_Note: release context was truncated for size limits. "
                      f"Included {len(selected_commits)} of {total_commit_count} commits and "
                      f"{len(selected_changed_files)} of {total_file_count} changed files._\n\n"
                  )
          
              for key, title in (
                  ("breaking_changes", "Breaking Changes"),
                  ("features", "Features"),
                  ("fixes", "Fixes"),
                  ("maintenance", "Maintenance"),
              ):
                  entries = sections[key]
                  if not entries:
                      continue
                  f.write(f"## {title}\n\n")
                  for item in entries:
                      f.write(f"- {item['subject']} ({item['hash']})\n")
                  f.write("\n")
          
              if structured["upgrade_notes"]:
                  f.write("## Upgrade Notes\n\n")
                  for note in structured["upgrade_notes"]:
                      f.write(f"- {note}\n")
                  f.write("\n")
          
              f.write("## Metadata\n\n")
              if PREV_TAG:
                  f.write(f"- Range: {PREV_TAG} -> {TAG}\n")
              else:
                  f.write(f"- Range: initial release up to {TAG}\n")
              f.write(f"- Commits analyzed: {len(selected_commits)} / {total_commit_count}\n")
              f.write(f"- Files analyzed: {len(selected_changed_files)} / {total_file_count}\n")
          PY

          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "context_file=$CONTEXT_FILE" >> "$GITHUB_OUTPUT"
          echo "structured_file=$STRUCTURED_FILE" >> "$GITHUB_OUTPUT"
          echo "deterministic_notes_file=$DETERMINISTIC_NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Generate Copilot release notes (optional)
        id: ai
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MODEL: openai/gpt-4.1-mini
          CONTEXT_FILE: ${{ steps.context.outputs.context_file }}
          STRUCTURED_FILE: ${{ steps.context.outputs.structured_file }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/release
          NOTES_FILE=".github/release/notes_ai.md"

          if [[ -z "${GITHUB_TOKEN:-}" ]]; then
            echo "GITHUB_TOKEN is unavailable; skipping Copilot notes generation."
            : > "$NOTES_FILE"
            echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

              {
              printf '%s\n' \
                'import json' \
                'import os' \
                'import urllib.error' \
                'import urllib.request' \
                '' \
                'context_file = os.environ["CONTEXT_FILE"]' \
                'structured_file = os.environ["STRUCTURED_FILE"]' \
                'token = os.environ.get("GITHUB_TOKEN", "")' \
                'model = os.environ.get("MODEL", "openai/gpt-4.1-mini")' \
                'notes_file = ".github/release/notes_ai.md"' \
                '' \
                'with open(context_file, "r", encoding="utf-8") as f:' \
                '    context = f.read()' \
                'with open(structured_file, "r", encoding="utf-8") as f:' \
                '    structured = json.load(f)' \
                '' \
                'prompt = (' \
                '    "Rewrite the provided structured release data into concise, user-facing GitHub release notes in Markdown. "' \
                '    "You must only use changes present in the provided sections and never invent items. "' \
                '    "Use sections in this exact order when relevant: Breaking Changes, Features, Fixes, Maintenance, Upgrade Notes. "' \
                '    "If a section has no content, omit it. Preserve every breaking change and upgrade note as explicit bullets. "' \
                '    "Keep each bullet traceable by retaining commit short hash in parentheses."' \
                ')' \
                '' \
                'payload = {' \
                '    "model": model,' \
                '    "messages": [' \
                '        {' \
                '            "role": "system",' \
                '            "content": "You are a release engineer. Write clear, accurate notes with zero hallucinations.",' \
                '        },' \
                '        {' \
                '            "role": "user",' \
                '            "content": (' \
                '                prompt' \
                '                + "\\n\\n<structured_json>\\n" + json.dumps(structured) + "\\n</structured_json>"' \
                '                + "\\n\\n<context_text>\\n" + context + "\\n</context_text>"' \
                '            ),' \
                '        },' \
                '    ],' \
                '    "temperature": 0.1,' \
                '}' \
                '' \
                'req = urllib.request.Request(' \
                '    "https://models.inference.ai.azure.com/chat/completions",' \
                '    data=json.dumps(payload).encode("utf-8"),' \
                '    headers={' \
                '        "Authorization": f"Bearer {token}",' \
                '        "Content-Type": "application/json",' \
                '    },' \
                '    method="POST",' \
                ')' \
                '' \
                'try:' \
                '    with urllib.request.urlopen(req, timeout=60) as resp:' \
                '        data = json.loads(resp.read().decode("utf-8"))' \
                'except urllib.error.HTTPError:' \
                '    data = {}' \
                'except urllib.error.URLError:' \
                '    data = {}' \
                '' \
                'text = (' \
                '    data.get("choices", [{}])[0]' \
                '    .get("message", {})' \
                '    .get("content", "")' \
                '    .strip()' \
                ')' \
                '' \
                'with open(notes_file, "w", encoding="utf-8") as f:' \
                '    f.write(text)'
              } | python -

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Build fallback notes
        id: fallback
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.context.outputs.previous_tag }}
          RANGE: ${{ steps.context.outputs.range }}
          AI_NOTES_FILE: ${{ steps.ai.outputs.notes_file }}
          DETERMINISTIC_NOTES_FILE: ${{ steps.context.outputs.deterministic_notes_file }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/release
          FINAL_NOTES_FILE=".github/release/release_notes.md"

          if [[ -s "$AI_NOTES_FILE" ]]; then
            cp "$AI_NOTES_FILE" "$FINAL_NOTES_FILE"
            echo "Using AI-generated release notes."
          elif [[ -s "$DETERMINISTIC_NOTES_FILE" ]]; then
            cp "$DETERMINISTIC_NOTES_FILE" "$FINAL_NOTES_FILE"
            echo "Using deterministic commit-derived release notes."
          else
            {
              echo "## Changes"
              if [[ -n "$PREVIOUS_TAG" ]]; then
                echo
                echo "Range: $PREVIOUS_TAG -> $TAG"
              else
                echo
                echo "Range: initial release up to $TAG"
              fi
              echo
              git log --no-merges --pretty='- %s (%h)' "$RANGE" | head -n 300
            } > "$FINAL_NOTES_FILE"
            echo "Using fallback git-log release notes."
          fi

          echo "notes_file=$FINAL_NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.fallback.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-beta') }}
