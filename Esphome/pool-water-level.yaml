# Interval to take readings and enter deep sleep
interval:
  - interval: 10min
    then:
      - switch.turn_on: sensor_power
      - delay: 200ms
      - component.update: pool_level_voltage
      - component.update: pool_level_percentage
      - component.update: battery_voltage
      - component.update: battery_percentage  
      - delay: 200ms
#      - switch.turn_off: sensor_power
#      - deep_sleep.enter: deep_sleep_control
#      - component.update: battery_voltage
#      - component.update: battery_percentage
#      - component.update: wifi_disconnects_since_boot_sensor

