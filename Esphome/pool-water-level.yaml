# inspiration from https://github.com/DerekSeaman/ESPHome-Seeed-Xiao-ESP32-C6-Config/blob/main/examples/common/Seeed%20xiao%20ESP32-c6%20base.yaml

esphome:
  name: pool-water-level
  friendly_name: pool water level
  on_boot:
    then:
     - switch.turn_on: sensor_power  
     - switch.turn_on: probe1_power
     - switch.turn_on: probe2_power  
esp32:
    variant: esp32c6
    board: seeed_xiao_esp32c6

substitutions:
  esp_id: pool_water_level
  esp_name: "pool water level"
  pin_led_board: GPIO2  # Pin for the status light

# Enable logging
logger:
  hardware_uart: USB_SERIAL_JTAG

# Enable Home Assistant API
api:
  encryption:
    key: "Ust8Vap3C9kKUrtxGDLNoLTn9IrFHnjNGxOryIV9mxQ="

ota:
  - platform: esphome
    password: "db199c93f383d899b0468fb947d40118"

wifi:
  ssid: !secret wifi__iot2_ssid
  password: !secret wifi_iot2_password
#  power_save_mode: HIGH
  enable_btm: true
  enable_rrm: true
  on_disconnect:
      then:
          - lambda: |-
              id(_wifi_disconnects_since_boot)++;

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Pool-Water-Level"
    password: ""

captive_portal:

output:
    - platform: gpio
      id: ant_gpio3
      pin: GPIO3

    - platform: gpio
      id: ant_gpio14
      pin: GPIO14


i2c:
  sda: GPIO22
  scl: GPIO23
  scan: false
  frequency: 100kHz
  timeout: 1s
# ADS1115 configuration
ads1115:
  - address: 0x48

# GPIO to power the sensor circuit
switch:
  - platform: gpio
    pin: GPIO17
    id: sensor_power
  - platform: homeassistant
    id: prevent_deep_sleep
    name: Prevent Deep Sleep
    entity_id: input_boolean.${esp_id}_ota_update_available
    on_turn_on:
      then:
#        - deep_sleep.prevent: deep_sleep_control
    on_turn_off:
      then:
#        - deep_sleep.allow: deep_sleep_control
# Read voltage from voltage divider (sensor + 470Ω resistor)

  # External antenna selector (FM8625H RF switch control)
  - platform: template
    name: "External Antenna"
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
        - output.turn_off: ant_gpio3     # LOW -> RF switch power ON
        - output.turn_on:  ant_gpio14    # HIGH -> external antenna (U.FL/RF2)
    turn_off_action:
        - output.turn_off: ant_gpio3     # LOW -> RF switch power ON
        - output.turn_off: ant_gpio14    # LOW -> internal antenna (PCB/RF1)


  # NEW: split power to each probe pull-up
  - platform: gpio
    id: probe1_power
    pin: GPIO18

  - platform: gpio
    id: probe2_power
    pin: GPIO19

sensor:
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 0.256
    name: "A0"
    id: pool_level_voltage
    update_interval: 15s
    internal: false

    # (Optional) Add a slight moving average if you see noise:
    # filters:
    #   - sliding_window_moving_average:
    #       window_size: 3
    #       send_every: 1
  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 0.256
    name: "A1"
    id: pool2_level_voltage
    update_interval: 15s
    internal: false

    # (Optional) Add a slight moving average if you see noise:
    # filters:
    #   - sliding_window_moving_average:
    #       window_size: 3
    #       send_every: 1

 # Water level percentage (calibrated)
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 0.256
    id: pool_level_percentage
    icon: MDI:Water
    name: "Pool Level"
    update_interval: 60s
    unit_of_measurement: "%"
    accuracy_decimals: 0  
    filters:  
      lambda: |-
        const float min_v = 0.00f;   // volts when dry
        const float max_v = 0.65f;   // <-- adjust after taking a "full" reading
        float v = id(pool_level_voltage).state;
        if (v <= min_v) return 0.0f;
        if (v >= max_v) return 100.0f;
        return (v - min_v) * 100.0f / (max_v - min_v);



  # Battery voltage reading via A0
  # ESP32-C6 ADC: 12-bit (0–4095), range ~0–3.3V
  # Resolution: ~0.805 mV per step
  # With 1:2 divider (200kΩ + 200kΩ): ~1.61 mV per step
  - platform: adc
    pin: GPIO0
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 10s
    internal: true
    attenuation: 12dB
    filters:
      - multiply: 2.0   # Correct for the 1:2 divider (200kΩ + 200kΩ)
      - offset: 0.09


  # Battery percentage based on Li-ion discharge curve
  # Non-linear mapping for 18650 cells
  - platform: template
    name: "Battery "
    id: battery_percentage
    icon: MDI:Battery
    unit_of_measurement: "%"
    accuracy_decimals: 0    
    lambda: |-

      float voltage = id(battery_voltage).state;
      if (voltage < 3.0) voltage = 3.0;
      if (voltage > 4.2) voltage = 4.2;

      if (voltage >= 4.20) return 100.0;
      else if (voltage >= 4.19) return 99.0;
      else if (voltage >= 4.18) return 98.0;
      else if (voltage >= 4.17) return 97.0;
      else if (voltage >= 4.16) return 96.0;
      else if (voltage >= 4.15) return 95.0;
